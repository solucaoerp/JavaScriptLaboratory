<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionando Elementos via JavaScript</title>
    <style>
        body{
            background: rgb(40, 136, 214);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Iniciando os estudos com DOM</h1>
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a usar o <strong>DOM</strong> em JavaScript</p>
    <div id='via-id'>Div identificada por ID</div>
    <div id='qry'>Div identificada por QuerySelector</div>    
    <div name='via-name'>Div identificada por Nome</div>
    <div class='via-class'>Div identificada por Classe</div>
        
    <script>
        var corpo = window.document.body

        corpo.style.background = 'gray'
        
        var p1 = window.document.getElementsByTagName('p')[0]
        window.document.write('<br/> Está escrito assim: ' + p1.innerText + '<br/>')
        // innerText: recupera o conteúdo sem a formatação

        p1.style.color = 'blue'        
        
        var p2 = window.document.getElementsByTagName('p')[1]
        window.document.write('Está escrito assim: ' + p2.innerHTML + '<br/>')
        // innerHTML: recupera o conteúdo em HTML com formatação

        p2.style.color = 'yellow'

        //window.alert(p2.innerHTML)

        // recuperando via ID
        var d = window.document.getElementById('via-id')
        window.document.write('A div está escrito assim: ' + d.innerText + '<br/>')
        d.style.background = 'blue'
        
        //d.innerText = 'estou aguardando' // comando1 funcional resumido
        //window.document.getElementById('msg').innerText = 'Olá' // comando funcional completo

        var divNome = window.document.getElementsByName('via-name')[0]
        window.document.write('Outra div está escrito assim: ' + divNome.innerText + '<br/>')

        var divClass = window.document.getElementsByClassName('via-class')[0]
        window.document.write('Outra div está escrito assim: ' + divClass.innerText + '<br/>')

        var divSelector = window.document.querySelector('div#qry')
        divSelector.style.background = 'yellow'
        divSelector.style.color = 'black'

    </script>
</body>
</html>
