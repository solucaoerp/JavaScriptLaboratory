<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa JavaScript...</title>
    <style>
        body{
            background-color: black;
            color: white;
            font: normal 16pt Calibri;
        }
        h1{
            color: greenyellow;
        }
        p{
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <hr>
    <p>Me livrei da maldição!</p>
    <script>
        /*
            O símbolo "+" na expressão: (number + number) = soma
            O símbolo "+" na expressão: (string + string) = concatena
        */
        var s = 'Charles Borges';

        var n1 = Number.parseInt(window.prompt("Informe um Valor para N1"));
        var n2 = Number.parseInt(window.prompt("Informe um Valor para N2"));
        var result = n1 + n2;
        window.alert("A soma é: " + result); // concatenação
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${result}`); // placeholder
        
        window.alert(`O tamanho da string é ${s.length}`);
        window.alert(`A String "s" convertida para MAIÚSCULA, fica ${s.toUpperCase()}`);
        window.alert(`A String "s" convertida para minúscula, fica ${s.toLowerCase()}`);
        
    </script>
</body>
</html>
