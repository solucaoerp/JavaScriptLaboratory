<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa JavaScript...</title>
    <style>
        body{
            background-color: black;
            color: white;
            font: normal 16pt Calibri;
        }
        h1{
            color: greenyellow;
        }
        p{
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <hr>
    <p>Me livrei da maldição!</p>
    <script>
        var nome = window.prompt("Qual é seu nome?");
        var idade = window.prompt("Qual é sua idade?");
        window.alert("O nome informado, foi: " + nome + "!");
        window.alert("A idade informada, foi: " + idade + " Parabéns!");
    </script>
</body>
</html>
