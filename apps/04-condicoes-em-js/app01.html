<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel">
    Executar <input type="button" value="Verificar" onclick="Calcular()">
    <div id="res">
    </div>
    <script>
        //var txtv = window.document.getElementById('txtvel')
        function Calcular(){
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value) // value: Minúsculo

            res.innerHTML = ''
            res.innerHTML = `<p>Sua velocidade atual é de [<strong>${vel}</strong>] km/h</p>`
            
            if (vel > 80){
                res.innerHTML += `<p>Você está <strong>MULTADO</strong> por excesso de velocidade.`
            }            
            
            res.innerHTML += `<p>Dirija sempre com cinto de segurança!</p>`
        }
    </script>
</body>
</html>
